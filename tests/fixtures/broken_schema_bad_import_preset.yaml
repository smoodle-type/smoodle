# Rime schema
# encoding: utf-8
#
# smoodle Thai phonetic input — BROKEN FIXTURE
#
# DELIBERATELY BROKEN: key_binder.import_preset references "nonexistent_preset_xyz".
# Valid presets: default, symbols, key_bindings, punctuation.
# Purpose: negative-test fixture for tests/test_schema_lint.py TestNegativeFixtures.
# Expected failure: validate_import_preset_resolution() returns (False, msg) with
# "nonexistent_preset_xyz" in msg.

schema:
  schema_id: thai_phonetic
  name: smoodle Thai phonetic
  version: "0.0.6"
  author:
    - lex
  description: |
    Broken fixture for import_preset validation.

switches:
  - name: ascii_mode
    reset: 0
    states: [ ไทย, ENG ]

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - table_translator
  filters:
    - uniquifier

speller:
  alphabet: 'abcdefghijklmnopqrstuvwxyz'
  delimiter: " '"
  algebra:
    - derive/kh/k/
    - derive/ph/p/

translator:
  dictionary: thai_phonetic
  enable_completion: true
  enable_sentence: false
  initial_quality: 0

punctuator:
  import_preset: symbols

key_binder:
  import_preset: nonexistent_preset_xyz
  bindings:
    - {when: paging, accept: comma, send: Page_Up}

recognizer:
  import_preset: default
