# Rime schema
# encoding: utf-8
#
# smoodle Thai phonetic input — BROKEN FIXTURE
#
# DELIBERATELY BROKEN: algebra rule "derive/ph" has only 2 slash-separated parts.
# Valid shape: <op>/<pattern>/<replacement>/[<flags>] (>= 3 parts).
# Purpose: negative-test fixture for tests/test_schema_lint.py TestNegativeFixtures.
# Expected failure: validate_schema_structure() returns (False, msg) with "derive/ph"
# (or "slash" / "parts") in msg.

schema:
  schema_id: thai_phonetic
  name: smoodle Thai phonetic
  version: "0.0.6"
  author:
    - lex
  description: |
    Broken fixture with malformed algebra rule.

switches:
  - name: ascii_mode
    reset: 0
    states: [ ไทย, ENG ]

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - table_translator
  filters:
    - uniquifier

speller:
  alphabet: 'abcdefghijklmnopqrstuvwxyz'
  delimiter: " '"
  algebra:
    - derive/kh/k/
    - derive/ph
    - derive/aa/a/

translator:
  dictionary: thai_phonetic
  enable_completion: true
  enable_sentence: false
  initial_quality: 0

punctuator:
  import_preset: symbols

key_binder:
  import_preset: default

recognizer:
  import_preset: default
