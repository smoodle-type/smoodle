  # === DIRECT: question words ===
  - {romanization: "arai",         expected_thai: "อะไร"}
  - {romanization: "krai",         expected_thai: "ใคร"}

  # 30 direct entries above. Algebra-tagged entries below.

  # === ALGEBRA kh→k: aspiration drop, anywhere in word ===
  - {romanization: "kopkoon",      expected_thai: "ขอบคุณ",  via: "kh->k"}
  - {romanization: "khopkun",      expected_thai: "ขอบคุณ",  via: "kh->k"}

  # === ALGEBRA ph→p: aspiration drop ===
  - {romanization: "puean",        expected_thai: "เพื่อน",  via: "ph->p"}

  # === ALGEBRA th→t: aspiration drop ===
  - {romanization: "kotot",        expected_thai: "ขอโทษ",   via: "th->t"}
  - {romanization: "toe",          expected_thai: "เถอะ",    via: "th->t"}

  # === ALGEBRA aa→a: vowel-length collapse ===
  - {romanization: "khaw",         expected_thai: "ข้าว",     via: "aa->a"}
  - {romanization: "kongwan",      expected_thai: "ของหวาน", via: "aa->a"}

  # === ALGEBRA ii→i: vowel-length collapse ===
  - {romanization: "sawadi",       expected_thai: "สวัสดี",  via: "ii->i"}
  - {romanization: "pi",           expected_thai: "ปี",       via: "ii->i"}

  # === ALGEBRA oo→o: vowel-length collapse ===
  - {romanization: "khopkon",      expected_thai: "ขอบคุณ",  via: "oo->o"}
  - {romanization: "lok",          expected_thai: "ลูก",      via: "oo->o"}

  # === ALGEBRA uu→u: vowel-length collapse ===
  - {romanization: "mu",           expected_thai: "มือ",      via: "uu->u"}

  # === ALGEBRA ee→e: vowel-length collapse ===
  - {romanization: "sawade",       expected_thai: "สวัสดี",  via: "ee->e"}
  - {romanization: "nate",         expected_thai: "นาที",    via: "ee->e"}

  # === ALGEBRA p$→b: final-stop voicing ===
  - {romanization: "khrab",        expected_thai: "ครับ",     via: "p$->b"}
  - {romanization: "krab",         expected_thai: "ครับ",     via: "p$->b"}

  # === ALGEBRA b$→p: final-stop voicing ===
  - {romanization: "kup",          expected_thai: "ครับ",     via: "b$->p"}
  - {romanization: "klup",         expected_thai: "กลับ",     via: "b$->p"}

  # === ALGEBRA t$→d: final-stop voicing ===
  - {romanization: "khotod",       expected_thai: "ขอโทษ",   via: "t$->d"}

  # === ALGEBRA d$→t: final-stop voicing ===
  - {romanization: "phat",         expected_thai: "ผัด",      via: "d$->t"}

  # 50 total. Manual-verify checklist (run after `bash scripts/install.sh`
  # + Squirrel Deploy):
  #   - All 30 direct entries should produce the expected Thai immediately.
  #   - All 20 algebra entries should produce the expected Thai via the
  #     algebra layer. If any FAIL, the rule may not be firing as expected
  #     (e.g., single-pass-vs-multi-pass semantics, regex anchoring) — flag
  #     it and we'll revise the schema.
