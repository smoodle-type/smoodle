# smoodle v0.1 dictionary fixture
#
# 50 (romanization, expected_thai) assertions covering the 601-word /
# 1193-entry dict (commit 6b68a99). Two assertion classes:
#
#   1. DIRECT — `romanization` is present as a literal dict entry for
#      `expected_thai`. Verified by string-match in test_dict.py.
#
#   2. ALGEBRA — tagged with `via: <rule-name>`. The romanization is
#      NOT in the dict but IS algebra-derivable from a dict entry by
#      the named rule (see speller.algebra in thai_phonetic.schema.yaml).
#      String-match driver SKIPs these with a note; full pipeline test
#      via librime CLI (future) will drive them through the engine.
#
# Coverage targets:
#   - Direct: 30 entries, ~2 per category × 16 categories
#   - Algebra: 20 entries, 1-2 per algebra rule × 12 rules

assertions:
