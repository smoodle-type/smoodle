  - {romanization: "ngern",        expected_thai: "เงิน"}
  - {romanization: "baht",         expected_thai: "บาท"}

  # === DIRECT: emotions ===
  - {romanization: "deejai",       expected_thai: "ดีใจ"}

  # === DIRECT: tech ===
