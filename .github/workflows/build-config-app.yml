name: build-config-app

# Builds Smoodle Config.app (Tauri 2 + Svelte 5) as a universal arm64+x86_64
# macOS bundle and publishes it as a gh release asset on the smoodle repo.
# smoodle-app/package/build-dmg.sh fetches this asset to bundle Config.app
# into the v0.0.8b+ DMG alongside Smoodle.app.
#
# Trigger: push of a tag matching `config-app-v*` (e.g. config-app-v0.0.8b).
# Manual: workflow_dispatch (no asset upload — build-only smoke check).

on:
  push:
    tags: ['config-app-v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Smoodle Config.app universal binary (macos-15)
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show runner identity
        run: |
          sw_vers
          uname -m
          echo "Ref: ${{ github.ref }}"

      - name: Install Rust + universal targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: config-app/pnpm-lock.yaml

      - name: pnpm install
        working-directory: config-app
        run: pnpm install --frozen-lockfile

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: cargo tauri build (universal)
        working-directory: config-app
        run: cargo tauri build --target universal-apple-darwin

      - name: Verify universal binary
        run: |
          BIN="config-app/src-tauri/target/universal-apple-darwin/release/bundle/macos/Smoodle Config.app/Contents/MacOS/Smoodle Config"
          lipo -info "$BIN"
          lipo -info "$BIN" | grep -q "x86_64 arm64\|arm64 x86_64"

      - name: Package as tarball
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          cd config-app/src-tauri/target/universal-apple-darwin/release/bundle/macos
          tar czf "$GITHUB_WORKSPACE/Smoodle-Config-${TAG}.tar.gz" "Smoodle Config.app"

      - name: Compute SHA256 sidecar
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          for f in Smoodle-Config-*.tar.gz; do
            shasum -a 256 "$f" > "${f}.sha256"
          done
          ls -la Smoodle-Config-*

      - name: Create draft release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          gh release create "${{ github.ref_name }}" \
            --draft \
            --title "Smoodle Config.app ${{ github.ref_name }}" \
            --notes "Smoodle Config.app universal macOS bundle. Consumed by smoodle-app/package/build-dmg.sh at v0.0.8b+ tags." \
            --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload assets to draft release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          gh release upload "${{ github.ref_name }}" \
            Smoodle-Config-*.tar.gz \
            Smoodle-Config-*.tar.gz.sha256 \
            --repo "${{ github.repository }}" \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          gh release edit "${{ github.ref_name }}" \
            --draft=false \
            --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
